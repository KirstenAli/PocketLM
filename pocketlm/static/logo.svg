<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PocketLM">
  <defs>
    <linearGradient id="pocketlm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6f7fff"/>
      <stop offset="100%" stop-color="#8a6dff"/>
    </linearGradient>
    <linearGradient id="pocketlm-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- pocket / rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#pocketlm-grad)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#pocketlm-shine)"/>
  <!-- four-point spark -->
  <path d="M32 14 L35.4 28.6 L50 32 L35.4 35.4 L32 50 L28.6 35.4 L14 32 L28.6 28.6 Z"
        fill="#ffffff" opacity="0.97"/>
  <!-- accent dot -->
  <circle cx="46.5" cy="17.5" r="2.6" fill="#ffffff" opacity="0.92"/>
</svg>

