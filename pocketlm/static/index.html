<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketLM</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="apple-touch-icon" href="/static/logo.svg">
  <meta name="theme-color" content="#7c8cff">
  <!-- Theme bootstrap: applied before first paint to avoid any FOUC.
       Also dynamically injects the matching highlight.js stylesheet. -->
  <script>
    (function () {
      var t = localStorage.getItem('pocketlm.theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      var l = document.createElement('link');
      l.id = 'hljs-theme';
      l.rel = 'stylesheet';
      l.href = 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github' +
               (t === 'light' ? '' : '-dark') + '.min.css';
      document.head.appendChild(l);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
